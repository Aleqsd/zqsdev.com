[build]
publish = "static"
command = ""

# Redirect the legacy résumé subdomain to the default founding résumé
[[redirects]]
from = "https://cv.zqsdev.com/*"
to = "https://founding.zqsdev.com/:splat"
status = 301
force = true

# Serve each targeted résumé viewer from its dedicated subdomain
[[redirects]]
from = "https://founding.zqsdev.com/*"
to = "/cv/founding/:splat"
status = 200
force = true

[[redirects]]
from = "https://devops.zqsdev.com/*"
to = "/cv/devops/:splat"
status = 200
force = true

[[redirects]]
from = "https://software.zqsdev.com/*"
to = "/cv/software/:splat"
status = 200
force = true

# Calendly keeps its vanity subdomain but points to the external scheduler
[[redirects]]
from = "https://calendly.zqsdev.com/*"
to = "https://calendly.com/alexandre-zqsdev/30min"
status = 301
force = true

# Convenience redirect for the /calendly path on the main site
[[redirects]]
from = "/calendly"
to = "https://calendly.com/alexandre-zqsdev/30min"
status = 301
force = true

# Proxy API requests to the self-hosted Axum backend
[[redirects]]
from = "/api/*"
to = "https://api.zqsdev.com/api/:splat"
status = 200
force = true

# Catch-all so the SPA stays routable on zqsdev.com / www.zqsdev.com
[[redirects]]
from = "/*"
to = "static/index.html"
status = 200

[[headers]]
for = "/*.webp"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.png"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.svg"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.ico"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/index.html"
  [headers.values]
  Cache-Control = "no-store"

[[headers]]
for = "/*.css"
  [headers.values]
  Cache-Control = "no-store"

[[headers]]
for = "/*.pdf"
  [headers.values]
  Cache-Control = "no-store"

[[headers]]
for = "/pkg/*.js"
  [headers.values]
  Cache-Control = "no-store"

[[headers]]
for = "/pkg/*.wasm"
  [headers.values]
  Cache-Control = "no-store"

[[headers]]
for = "/data/*.json"
  [headers.values]
  Cache-Control = "no-store"
